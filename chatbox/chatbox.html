<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>TFC Chatbox</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --purple: #8B88F8;
      --purple-light: #a29bfe;
      --purple-dim: rgba(139,136,248,0.12);
      --bg: #1b1d1f;
      --bg-card: #2e2f31;
      --bg-input: #252526;
      --text: #f0f0f0;
      --muted: #aaa;
      --border: #3a3b3d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--bg-input);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--purple-dim);
      border: 1px solid var(--purple);
      display: flex; align-items: center; justify-content: center;
      color: var(--purple);
      font-size: 16px;
    }

    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .model-badge {
      margin-left: auto;
      font-size: 10px;
      background: var(--purple-dim);
      border: 1px solid rgba(139,136,248,0.3);
      color: var(--purple-light);
      border-radius: 20px;
      padding: 3px 10px;
      display: flex; align-items: center; gap: 5px;
    }

    .model-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--purple) transparent;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: #5a5a5a; border-radius: 4px; }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 14px;
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .welcome-icon {
      width: 60px; height: 60px;
      border-radius: 18px;
      background: var(--purple-dim);
      border: 1px solid rgba(139,136,248,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      color: var(--purple);
    }

    .welcome h3 { font-size: 16px; color: var(--text); font-weight: 600; }
    .welcome p { font-size: 13px; max-width: 360px; line-height: 1.6; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }

    .chip {
      font-size: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chip:hover {
      border-color: var(--purple);
      color: var(--purple);
      background: var(--purple-dim);
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }

    .msg.user .avatar {
      background: #3d3b6e;
      color: var(--purple-light);
      border: 1px solid rgba(139,136,248,0.4);
    }

    .msg.ai .avatar {
      background: var(--purple-dim);
      color: var(--purple);
      border: 1px solid rgba(139,136,248,0.3);
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.65;
    }

    .msg.user .bubble {
      background: #3d3b6e;
      color: #e8e6ff;
      border-top-right-radius: 3px;
    }

    .msg.ai .bubble {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-top-left-radius: 3px;
    }

    .bubble p { margin-bottom: 7px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { color: var(--purple-light); }
    .bubble ul { padding-left: 18px; margin: 5px 0; }
    .bubble li { margin-bottom: 3px; }
    .bubble code {
      background: rgba(139,136,248,0.15);
      color: var(--purple-light);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-top-left-radius: 3px;
      width: fit-content;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--purple);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: 0.5;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    .input-bar {
      padding: 14px 20px;
      background: var(--bg-input);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: flex-end;
      padding: 0 12px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--purple);
      box-shadow: 0 0 0 2px rgba(139,136,248,0.15);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      font-size: 13.5px;
      resize: none;
      max-height: 120px;
      min-height: 40px;
      padding: 10px 0;
      line-height: 1.5;
    }

    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 8px;
      background: var(--purple);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 14px;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled) { background: var(--purple-light); }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled { background: #3a3b3d; color: #555; cursor: not-allowed; }

    .error-msg {
      font-size: 12px;
      color: #ff8080;
      padding: 8px 14px;
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 8px;
      align-self: flex-start;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon"><i class="fas fa-robot"></i></div>
    <div>
      <div class="header-title">TFC Chatbox</div>
      <div class="header-sub">Assistente local · Ollama</div>
    </div>
    <div class="model-badge">
      <div class="dot"></div>
      qwen2.5:7b
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon"><i class="fas fa-comments"></i></div>
      <h3>Olá! Sou o assistente do TFC.</h3>
      <p>Podes fazer-me qualquer pergunta sobre o SprintLab ou o teu projeto.</p>
      <div class="suggestions">
        <div class="chip" onclick="useSuggestion(this)">O que é o SprintLab?</div>
        <div class="chip" onclick="useSuggestion(this)">Quais são os objetivos do TFC?</div>
        <div class="chip" onclick="useSuggestion(this)">Que tecnologias são usadas?</div>
        <div class="chip" onclick="useSuggestion(this)">O que é RAG?</div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="Escreve a tua pergunta..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="resize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="send()">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

      <script>
    const BASE_URL = "https://unglamourously-hypoxic-jaylah.ngrok-free.dev";
    const MODEL = "qwen2.5:7b";
    const history = [];
    let loading = false;

    function resize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }
    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    }
    function useSuggestion(el) {
      document.getElementById("input").value = el.textContent;
      send();
    }
    function removeWelcome() {
      const w = document.getElementById("welcome");
      if (w) w.remove();
    }
    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
    function renderMd(text) {
      text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
      text = text.replace(/\*(.*?)\*/g, "<em>$1</em>");
      text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
      let html = "";
      for (const line of text.split("\n")) {
        const t = line.trim();
        if (!t) continue;
        if (/^[\-\*] /.test(t)) html += `<li>${t.slice(2)}</li>`;
        else html += `<p>${t}</p>`;
      }
      html = html.replace(/(<li>[\s\S]*?<\/li>)+/g, m => `<ul>${m}</ul>`);
      return html;
    }
    function addMsg(role, text) {
      removeWelcome();
      const msgs = document.getElementById("messages");
      const wrap = document.createElement("div");
      wrap.className = `msg ${role}`;
      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = role === "user" ? "Tu" : "AI";
      const bub = document.createElement("div");
      bub.className = "bubble";
      bub.innerHTML = role === "user" ? `<p>${escHtml(text)}</p>` : renderMd(text);
      wrap.appendChild(av);
      wrap.appendChild(bub);
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }
    function showTyping() {
      removeWelcome();
      const msgs = document.getElementById("messages");
      const wrap = document.createElement("div");
      wrap.className = "msg ai"; wrap.id = "typing";
      const av = document.createElement("div");
      av.className = "avatar"; av.textContent = "AI";
      const t = document.createElement("div");
      t.className = "typing";
      t.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
      wrap.appendChild(av); wrap.appendChild(t);
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }
    function hideTyping() {
      const t = document.getElementById("typing");
      if (t) t.remove();
    }
    function showError(msg) {
      const msgs = document.getElementById("messages");
      const e = document.createElement("div");
      e.className = "error-msg";
      e.textContent = msg;
      msgs.appendChild(e);
      msgs.scrollTop = msgs.scrollHeight;
    }

    // ── Deteção de intenções ──────────────────────────────────────────────────
    function detectIntent(text) {
      const t = text.toLowerCase();

      // Criar issue
      const createMatch = text.match(/cri[ae][^'"]*['"]([^'"]+)['"]/i)
                       || text.match(/cri[ae] (?:uma )?issue[:\s]+(.+)/i)
                       || text.match(/nova issue[:\s]+['"]?([^'"]+)['"]?/i);
      if (createMatch) return { type: "create_issue", title: createMatch[1].trim() };

      // Fechar issue
      const closeMatch = text.match(/fecha[r]?\s+(?:a\s+)?issue\s+#?(\d+)/i)
                      || text.match(/close\s+issue\s+#?(\d+)/i);
      if (closeMatch) return { type: "close_issue", iid: closeMatch[1] };

      // Atualizar título da issue
      const updateTitleMatch = text.match(/atualiz[ae][^#]*#(\d+)[^'"]*['"]([^'"]+)['"]/i)
                            || text.match(/muda[r]? (?:o )?t[ií]tulo da issue #?(\d+)[^'"]*['"]([^'"]+)['"]/i);
      if (updateTitleMatch) return { type: "update_issue", iid: updateTitleMatch[1], fields: { title: updateTitleMatch[2].trim() } };

      // Exportar issues
      if (/export[ae][r]?|download|csv|ficheiro de issues/i.test(t)) {
        const state = /fecha[ds]|closed/i.test(t) ? "closed" : /abert[as]|opened/i.test(t) ? "opened" : "all";
        return { type: "export_issues", state };
      }

      return { type: "chat" };
    }

    // ── Ações GitLab ──────────────────────────────────────────────────────────
    async function createIssue(title, description) {
      const res = await fetch(`${BASE_URL}/gitlab/issues`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
        body: JSON.stringify({ title, description: description || "Criada via TFC Chatbox" })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function closeIssue(iid) {
      const res = await fetch(`${BASE_URL}/gitlab/issues/${iid}/close`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
        body: JSON.stringify({})
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function updateIssue(iid, fields) {
      const res = await fetch(`${BASE_URL}/gitlab/issues/${iid}/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
        body: JSON.stringify(fields)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    function exportIssues(state) {
      const url = `${BASE_URL}/gitlab/export?state=${state}`;
      const a = document.createElement("a");
      a.href = url;
      a.download = "gitlab_issues.csv";
      a.click();
    }

    async function askOllama(userText) {
      let prompt = "";
      for (const m of history.slice(-10)) {
        prompt += m.role === "user" ? `Utilizador: ${m.content}\n` : `Assistente: ${m.content}\n`;
      }
      prompt += "Assistente:";
      const res = await fetch(`${BASE_URL}/api/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
        body: JSON.stringify({ model: MODEL, prompt, stream: false })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return (data.response || "Sem resposta.").trim();
    }

    // ── Send principal ────────────────────────────────────────────────────────
    async function send() {
      if (loading) return;
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      input.style.height = "auto";
      document.getElementById("send-btn").disabled = true;
      loading = true;

      addMsg("user", text);
      history.push({ role: "user", content: text });
      showTyping();

      try {
        const intent = detectIntent(text);

        if (intent.type === "create_issue") {
          const issue = await createIssue(intent.title);
          hideTyping();
          const reply = `✅ **Issue criada com sucesso!**\n\n- **Título:** ${issue.title}\n- **ID:** #${issue.iid}\n- **Estado:** Aberta\n- **Link:** ${issue.web_url}`;
          addMsg("ai", reply);
          history.push({ role: "assistant", content: reply });

        } else if (intent.type === "close_issue") {
          const issue = await closeIssue(intent.iid);
          hideTyping();
          const reply = `🔒 **Issue #${intent.iid} fechada com sucesso!**\n\n- **Título:** ${issue.title}\n- **Estado:** Fechada`;
          addMsg("ai", reply);
          history.push({ role: "assistant", content: reply });

        } else if (intent.type === "update_issue") {
          const issue = await updateIssue(intent.iid, intent.fields);
          hideTyping();
          const reply = `✏️ **Issue #${intent.iid} atualizada!**\n\n- **Novo título:** ${issue.title}\n- **Estado:** ${issue.state}\n- **Link:** ${issue.web_url}`;
          addMsg("ai", reply);
          history.push({ role: "assistant", content: reply });

        } else if (intent.type === "export_issues") {
          hideTyping();
          exportIssues(intent.state);
          const stateLabel = intent.state === "all" ? "todas" : intent.state === "opened" ? "abertas" : "fechadas";
          const reply = `📥 **A exportar issues (${stateLabel}) para CSV...**\n\nO ficheiro \`gitlab_issues.csv\` vai ser descarregado automaticamente.`;
          addMsg("ai", reply);
          history.push({ role: "assistant", content: reply });

        } else {
          const reply = await askOllama(text);
          hideTyping();
          addMsg("ai", reply);
          history.push({ role: "assistant", content: reply });
        }

      } catch (err) {
        hideTyping();
        showError(`Erro: ${err.message}`);
        history.pop();
      }

      loading = false;
      document.getElementById("send-btn").disabled = false;
      document.getElementById("input").focus();
    }
  </script>

</body>
</html>
